version: "3.8"

services:
  db:
    image: postgres
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"

    redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"